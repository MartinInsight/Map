name: Deploy
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# ▼▼▼ 새로운 보안 설정 ▼▼▼
permissions:
  contents: write  # gh-pages 배포에 필요한 최소 권한
  id-token: write  # OIDC 토큰 사용 (선택사항)

jobs:
  deploy:
    runs-on: ubuntu-latest
    # ▼▼▼ 환경 변수 보호 ▼▼▼
    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: 'false'
      PYTHONWARNINGS: 'ignore:Unverified HTTPS request'
      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 불필요한 커밋 기록 제한

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          check-latest: true  # 최신 보안 패치 적용

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread==6.0.0 pandas==2.0.3  # 버전 고정
          pip audit  # 취약점 검사

      - name: Secure data directory setup
        run: |
          mkdir -p data
          chmod 700 data  # 소유자만 접근 가능
          ls -la data/  # 권한 확인

      - name: Generate JSON data
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIAL_JSON: ${{ secrets.GOOGLE_CREDENTIAL_JSON }}
        run: |
          # 보안 감사 로그 활성화
          export PYTHONWARNINGS="default"
          python -c "import os; print('ENV KEYS:', [k for k in os.environ if 'KEY' in k])"
          
          # 스크립트 실행 (stderr도 출력)
          python scripts/fetch_data.py 2>&1 | tee -a security.log
          
          # 보안 로그 검사
          if grep -q -i 'error\|warning\|fail' security.log; then
            echo "::warning::보안 문제 발견"
            cat security.log
          fi
          rm -f security.log

      - name: Deploy to GH Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: false  # 기존 파일 모두 삭제 후 새로 배포
