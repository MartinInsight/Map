<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.S. Truck Congestion Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="map"></div>
    <div class="map-control">
        <h3>Truck Congestion Map</h3>
        <div class="toggle-container">
            <button id="inboundBtn" class="toggle-btn active">Inbound</button>
            <button id="outboundBtn" class="toggle-btn">Outbound</button>
        </div>
    </div>

    <!-- Google Sheets API & Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="js/google-sheets.js"></script>
    <script src="js/Truck.js" type="module"></script>
</body>
</html>
